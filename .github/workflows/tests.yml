name: tests

on:
  pull_request:
    paths-ignore:
      - ".vscode/**"
      - ".pre-commit-config.yaml"
      - "*.md"
  push:
    branches: [main]
    paths-ignore:
      - ".vscode/**"
      - ".pre-commit-config.yaml"
      - "*.md"
  workflow_dispatch:

permissions:
  contents: read

env:
  UV_PYTHON: "3.12"
  FORCE_COLOR: 1

jobs:
  ruff:
    name: Run ruff check and ruff format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv sync --frozen
      - name: Lint with ruff
        run: uv run python run.py ruff-check
      - name: Format with ruff
        run: uv run python run.py ruff-format
  pytest:
    name: Run the test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          save-cache: "false"
      - name: Install dependencies
        run: uv sync --frozen
      - run: uv run python run.py pytest
  mypy:
    name: Run mypy on the tests and on the stubs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          save-cache: "false"
      - name: Install dependencies
        run: uv sync --frozen
      - run: uv run python run.py mypy
  stubtest:
    name: Run stubtest on the the stubs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          save-cache: "false"
      - name: Install dependencies
        run: uv sync --frozen
      - run: uv run python run.py stubtest
  pyright:
    name: Run pyright on the tests and on the stubs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          save-cache: "false"
      - name: Install dependencies
        run: uv sync --frozen
      - run: uv run python run.py pyright
  ty:
    name: Run ty on the tests and on the stubs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          save-cache: "false"
      - name: Install dependencies
        run: uv sync --frozen
      - run: uv run python run.py ty-check
  pyrefly:
    name: Run pyrefly on the tests and on the stubs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          save-cache: "false"
      - name: Install dependencies
        run: uv sync --frozen
      - run: uv run python run.py pyrefly-check
